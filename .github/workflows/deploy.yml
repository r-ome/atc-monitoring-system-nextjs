name: Deploy ATC to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run regression tests
        run: npm run test:regression

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Prepare standalone bundle
        run: |
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/

          tar -czf release.tgz -C .next/standalone .
          tar -czf prisma.tgz prisma

      - name: Upload to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "release.tgz,prisma.tgz"
          target: "~/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          AWS_S3_CONTAINER_REPORTS_BUCKET: ${{ vars.AWS_S3_CONTAINER_REPORTS_BUCKET || secrets.AWS_S3_CONTAINER_REPORTS_BUCKET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,AWS_S3_CONTAINER_REPORTS_BUCKET
          script: |
            set -e

            APP_DIR=~/atc-monitoring-system
            RUNTIME_DIR=$APP_DIR/runtime
            MIG_DIR=$APP_DIR/migrations-runner

            if [ -z "${AWS_REGION:-}" ] || [ -z "${AWS_S3_CONTAINER_REPORTS_BUCKET:-}" ]; then
              echo "Missing AWS_REGION or AWS_S3_CONTAINER_REPORTS_BUCKET GitHub variable/secret."
              exit 1
            fi

            set_env_var() {
              key="$1"
              value="$2"
              file="$APP_DIR/.env"
              tmp_file="$(mktemp)"
              deploy_user="$(id -un)"
              deploy_group="$(id -gn)"

              if [ -f "$file" ]; then
                if [ -r "$file" ]; then
                  cp "$file" "$tmp_file"
                else
                  sudo cat "$file" > "$tmp_file"
                fi
              fi

              if grep -q "^${key}=" "$tmp_file"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$tmp_file"
              else
                printf "\n%s=%s\n" "$key" "$value" >> "$tmp_file"
              fi

              if [ -f "$file" ] && [ -w "$file" ]; then
                cat "$tmp_file" > "$file"
              elif [ ! -f "$file" ] && [ -w "$APP_DIR" ]; then
                install -m 600 "$tmp_file" "$file"
              else
                sudo install -m 600 -o "$deploy_user" -g "$deploy_group" "$tmp_file" "$file"
              fi

              rm -f "$tmp_file"
            }

            set_env_var "AWS_REGION" "$AWS_REGION"
            set_env_var "AWS_S3_CONTAINER_REPORTS_BUCKET" "$AWS_S3_CONTAINER_REPORTS_BUCKET"

            # --- Deploy runtime (Next standalone) ---
            mkdir -p "$RUNTIME_DIR"
            rm -rf "$RUNTIME_DIR"/*
            tar -xzf ~/release.tgz -C "$RUNTIME_DIR"
            rm -f ~/release.tgz

            # --- Deploy prisma folder into migrations-runner ---
            mkdir -p "$MIG_DIR"
            rm -rf "$MIG_DIR/prisma"
            tar -xzf ~/prisma.tgz -C "$MIG_DIR"
            rm -f ~/prisma.tgz

            # --- Run migrations using pinned Prisma in migrations-runner ---
            cd "$MIG_DIR"
            npm ci --legacy-peer-deps

            set -a
            source "$APP_DIR/.env"
            set +a

            ./node_modules/.bin/prisma migrate deploy --schema prisma/schema.prisma

            # --- Reload app ---
            pm2 reload "$APP_DIR/ecosystem.config.js" --update-env
